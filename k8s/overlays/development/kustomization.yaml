apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: nestarr-development

namespace: nestarr

resources:
  - ../../base

# Development-specific patches
patches:
  # Reduce replicas for development
  - target:
      kind: Deployment
      name: nestarr
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Single PostgreSQL instance for development
  - target:
      kind: StatefulSet
      name: postgres-ha
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Lower HPA thresholds for development
  - target:
      kind: HorizontalPodAutoscaler
      name: nestarr-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Adjust PDB for single instance - keep at least 1 available to prevent data loss
  - target:
      kind: PodDisruptionBudget
      name: postgres-pdb
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 1

labels:
  - pairs:
      environment: development

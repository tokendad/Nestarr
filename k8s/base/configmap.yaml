apiVersion: v1
kind: ConfigMap
metadata:
  name: nestarr-config
  namespace: nestarr
  labels:
    app.kubernetes.io/name: nestarr
    app.kubernetes.io/component: config
data:
  # Application settings
  PROJECT_NAME: "Nestarr"
  APP_PORT: "8181"
  TZ: "Etc/UTC"

  # Database connection settings (PostgreSQL HA)
  DB_HOST: "postgres-ha"
  DB_PORT: "5432"
  DB_NAME: "nestarr"
  DB_USER: "nestarr"

  # JWT settings
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

  # AI settings (optional - leave empty to disable)
  GEMINI_MODEL: "gemini-2.0-flash"
  GEMINI_REQUEST_DELAY: "4.0"

  # CORS settings (update with your domain)
  CORS_ORIGINS: ""

  # Storage settings
  # Options: "local" or "s3"
  # For S3, also set S3_BUCKET_NAME, S3_REGION in secrets
  STORAGE_TYPE: "local"

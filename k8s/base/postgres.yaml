apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: nestarr
  labels:
    app.kubernetes.io/name: nestarr
    app.kubernetes.io/component: database
data:
  init-db.sh: |
    #!/bin/bash
    set -e

    # Create the nestarr database and user
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- Create nestarr user if not exists
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'nestarr') THEN
                CREATE USER nestarr WITH PASSWORD '$NESTARR_PASSWORD';
            END IF;
        END
        \$\$;

        -- Create nestarr database if not exists
        SELECT 'CREATE DATABASE nestarr OWNER nestarr'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'nestarr')\gexec

        -- Grant all privileges
        GRANT ALL PRIVILEGES ON DATABASE nestarr TO nestarr;
    EOSQL

    # Connect to nestarr database and grant schema privileges
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "nestarr" <<-EOSQL
        GRANT ALL ON SCHEMA public TO nestarr;
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO nestarr;
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO nestarr;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO nestarr;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO nestarr;
    EOSQL
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-ha
  namespace: nestarr
  labels:
    app.kubernetes.io/name: nestarr
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-ha-headless  # Reference headless service for proper DNS resolution
  replicas: 3  # HA configuration with 3 replicas
  selector:
    matchLabels:
      app: postgres-ha
  template:
    metadata:
      labels:
        app: postgres-ha
        app.kubernetes.io/name: nestarr
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999  # postgres group
      initContainers:
        - name: init-permissions
          image: busybox:1.37
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/postgresql/data || true']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: NESTARR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: NESTARR_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: nestarr
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ha
  namespace: nestarr
  labels:
    app.kubernetes.io/name: nestarr
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres-ha
---
# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: postgres-ha-headless
  namespace: nestarr
  labels:
    app.kubernetes.io/name: nestarr
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres-ha
